<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Givago — Gerador de Documentos</title>
    <meta name="description" content="Sistema interno de geração de orçamentos e contratos" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0f0f13" />

    <!-- iOS PWA: permite instalar como app na tela inicial -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Givago" />
    <link rel="apple-touch-icon" href="/icon-pwa.png" />
    <link rel="icon" href="/icon-pwa.png" type="image/png" />

    <!--
      Anti-flash de tema: aplica .dark no <html> ANTES do React renderizar,
      evitando piscar de tema errado ao carregar a página.
      Respeita: 1) preferência manual salva; 2) preferência do sistema operacional.
    -->
    <script>
      (function () {
        var salvo = localStorage.getItem('givago_theme');
        var sistema = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var escuro = salvo !== null ? salvo === 'dark' : sistema;
        if (escuro) document.documentElement.classList.add('dark');
      })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <style>
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Lato', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
