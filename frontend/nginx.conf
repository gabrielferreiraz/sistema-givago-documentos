server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache longo para assets com hash no nome (Vite os versiona automaticamente)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota não encontrada retorna o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
